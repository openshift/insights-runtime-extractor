---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: insights-runtime-extractor-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: insights-runtime-extractor-role
rules:
- apiGroups:
  - security.openshift.io
  resourceNames:
  - insights-runtime-extractor-scc
  resources:
  - securitycontextconstraints
  verbs:
  - use
---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: insights-runtime-extractor-scc
allowHostDirVolumePlugin: true
allowHostPID: true
allowPrivilegedContainer: true
allowedCapabilities:
- CAP_SYS_ADMIN
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
seccompProfiles:
- runtime/default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: insights-runtime-extractor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: insights-runtime-extractor-role
subjects:
  - kind: ServiceAccount
    name: insights-runtime-extractor-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: insights-runtime-extractor
rules:
  - apiGroups:
      - ""
    verbs:
      - create
    resources:
      - pods/exec
  - apiGroups:
      - apps
    verbs:
      - create
      - delete
      - get
      - list
      - watch
    resources:
      - daemonsets
  - apiGroups:
      - "config.openshift.io"
    resources:
      - "apiservers"
    verbs:
      - "get"
      - "watch"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: insights-runtime-extractor-tls
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: insights-runtime-extractor-tls
subjects:
  - kind: ServiceAccount
    name: insights-runtime-extractor-sa
    namespace: openshift-insights
