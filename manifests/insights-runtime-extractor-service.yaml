# The insights-runtime-extractor defines a headless service
# so that a certificate is generated to access the daemonset's pods
# with TLS
apiVersion: v1
kind: Service
metadata:
  name: extractor
  annotations:
    include.release.openshift.io/hypershift: "true"
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
    capability.openshift.io/name: Insights
    # The insights-runtime-extractor-tls is used by the insights-runtime--extractor
    # to configure its TLS certificate
    service.beta.openshift.io/serving-cert-secret-name: insights-runtime-extractor-tls
  labels:
    app.kubernetes.io/name: insights-runtime-extractor
spec:
  selector:
    app.kubernetes.io/name: insights-runtime-extractor
  ports:
    - name: tcp
      protocol: TCP
      port: 3000
      targetPort: tcp
  type: ClusterIP
  clusterIP: None